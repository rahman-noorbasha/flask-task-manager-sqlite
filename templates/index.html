<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>Task Manager</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter task" required>
        <button type="submit">Add Task</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            {{ task[1] }}
            <a href="/delete/{{ task[0] }}">Delete</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
